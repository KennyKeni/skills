schema_version: 1

lead:
  name: Claude
  skill_slug: claude-subagent-routing
  title: Claude Subagent Routing
  native: false
  validation_context: |-
    Start each initial formal validation pass in a fresh delegated session that
    excludes implementation history, following the validator route's fresh
    requirement. Pass only its compact validation packet, including the
    no-delegation boundary. If fresh context cannot be established, report that
    independent validation is unavailable rather than claiming it.

lanes:
  - slug: claude-native
    harness: native-claude
    title: Native Claude Lane
    description_name: native Claude
    selection_label: native Claude subagents
    policy: classified
    default: true
    external: false
    routes:
      routine_scout: {executor: lane, model_ref: scout}
      consequential_scout: {executor: lane, model_ref: worker}
      routine_worker: {executor: lane, model_ref: worker}
      consequential_worker: {executor: lane, model_ref: worker}
      validator: {executor: lane, model_ref: worker, fresh: true}

  - slug: codex-sol
