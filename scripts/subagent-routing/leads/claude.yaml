    title: Codex Sol Lane
    description_name: Codex Sol
    selection_label: Codex Sol
    policy: classified
    default: false
    external: true
    routes:
      routine_scout: {executor: lane, model_ref: scout, effort: medium}
      consequential_scout: {executor: lane, model_ref: scout, effort: high}
      routine_worker: {executor: lane, model_ref: worker, effort: medium}
      consequential_worker: {executor: lane, model_ref: worker, effort: high}
