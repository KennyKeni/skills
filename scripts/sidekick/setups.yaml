schema_version: 1

lead:
  name: Codex

setups:
  - slug: luna-max
    harness: native-codex
    title: Luna Max
    selection_label: Luna Max
    default: true
    sidekick_model: gpt-5.6-luna
    reasoning_effort: max
    agent_type: worker
    task_name: sidekick
    context_fork: none

  - slug: opencode-grok
    harness: opencode-grok-4-5
    title: Grok 4.5 via OpenCode
    selection_label: Grok 4.5 through OpenCode
    default: false

  - slug: opencode-qwen
    harness: opencode-qwen-3-8-max-preview
    title: Qwen3.8 Max Preview via OpenCode
    selection_label: Qwen3.8 Max Preview through OpenCode
    default: false
    policy_note: |-
      ## Keep Implementation On Qwen

      Send every implementation, edit, repair, test-fix, and review-correction
      work unit to the persistent Qwen sidekick. Keep the main agent on
      planning, ambiguity resolution, consequential decisions, supervision, and
      final review; the main agent must not implement changes in this setup. If
      Qwen is unavailable or cannot safely complete the work, stop and report
      the limitation rather than substituting a GPT model for implementation.

  - slug: cursor-grok
    harness: cursor-grok-4-5
    title: Grok 4.5 via Cursor
    selection_label: Grok 4.5 through Cursor
    default: false
