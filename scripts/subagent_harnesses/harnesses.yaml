schema_version: 1

x-snippets:
  no-fast-variant: &no_fast_variant Never substitute a `fast` variant.

lead_profiles:
  - id: codex
    lead_label: Codex-led
    output: global/generated/codex/AGENTS.md
    quiet_wait_seconds: 600
    cache_window_seconds: 1800
    cache_rationale: the documented GPT-5.6 minimum prompt-cache lifetime
    minimum_poll_seconds:
    computer_use: true

  - id: claude
    lead_label: Claude Code-led
    output: global/generated/claude/CLAUDE.md
    quiet_wait_seconds: 240
    cache_window_seconds: 300
    cache_rationale: Claude Code's default prompt-cache lifetime
    minimum_poll_seconds:
    computer_use: false

  - id: general
    lead_label: general
    output: global/generated/general/AGENTS.md
    quiet_wait_seconds:
    cache_window_seconds:
    cache_rationale:
    minimum_poll_seconds: 60
    computer_use: false

harnesses:
  - id: native-codex
    family: codex-native

  - id: native-claude
    family: claude-native
    models:
      shared: claude-opus-4-8
      validator: claude-fable-5

  - id: codex-exec-sol
    family: codex-exec
    models:
      shared: gpt-5.6-sol

  - id: codex-exec-luna
    family: codex-exec
    models:
      shared: gpt-5.6-luna

  - id: cursor-grok-4-5
    family: cursor
    models:
      shared: cursor-grok-4.5-high
    model_label_patterns:
      cursor-grok-4.5-high: Cursor Grok 4\.5
    model_caution: *no_fast_variant

  - id: opencode-grok-4-5
    family: opencode
    models:
      shared: xai/grok-4.5
    title_prefix: grok
    model_caution: *no_fast_variant

  - id: opencode-qwen-3-8-max-preview
    family: opencode
    models:
      shared: alibaba-token-plan/qwen3.8-max-preview
    title_prefix: qwen
    # Preview model: a local cache entry may precede the upstream catalog.
    refresh_models: false

  - id: opencode-ollama
    family: opencode
    title_prefix: ollama
    models:
      capability:
        default: ollama-cloud/glm-5.2
        variable: MODEL
        choices_markdown: |-
          - `ollama-cloud/glm-5.2` for text and code retrieval, implementation, and the
            largest text-only contexts;
          - `ollama-cloud/kimi-k2.7-code` when the assignment requires image input;
          - `ollama-cloud/minimax-m3` when the assignment requires video input or
            image-plus-text context beyond Kimi's capacity.
