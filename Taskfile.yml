version: "3"

silent: true

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  cli:check:
    desc: Type-check the groundwork CLI workspace.
    cmds:
      - mise exec -- pnpm check

  cli:test:
    desc: Run the groundwork CLI test suite.
    cmds:
      - mise exec -- pnpm test

  cli:verify:
    desc: Check, test, build, and smoke-test the packed groundwork CLI.
    cmds:
      - mise exec -- pnpm verify

  cli:release:
    desc: Create the groundwork package version tag, then push the current branch and tag.
    cmds:
      - |
        set -euo pipefail

        remote="${REMOTE:-origin}"
        branch="$(git branch --show-current)"
        if [ -z "$branch" ]; then
          echo "Refusing to release from a detached HEAD."
          exit 1
        fi

        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Refusing to tag with uncommitted changes."
          git status --short
          exit 1
        fi

        version="$(node --input-type=module -e "import fs from 'node:fs'; process.stdout.write(JSON.parse(fs.readFileSync('packages/groundwork/package.json', 'utf8')).version)")"
        tag="groundwork-v$version"
        head_commit="$(git rev-parse HEAD)"

        echo "Preparing release $tag from $branch at $head_commit"
        git fetch "$remote" --tags

        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          tag_commit="$(git rev-list -n 1 "$tag")"
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Refusing to move existing tag $tag."
            echo "$tag points to $tag_commit, but HEAD is $head_commit."
            exit 1
          fi
          echo "Using existing local tag $tag at HEAD."
        else
          if git ls-remote --exit-code --tags "$remote" "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Remote tag $tag already exists on $remote. Fetch tags and inspect before releasing."
            exit 1
          fi
          git tag -a "$tag" -m "Release $tag"
        fi

        git push "$remote" "$branch"
        git push "$remote" "refs/tags/$tag"
        echo "Released $tag."

  skills:routing:generate:
    desc: Generate routing skills, lane references, and global instruction variants.
    cmds:
      - uv run --script scripts/subagent-routing/generate_references.py

  skills:routing:check:
    desc: Check that generated routing and global instruction outputs are current.
    cmds:
      - uv run --script scripts/subagent-routing/generate_references.py --check

  skills:sidekick:generate:
    desc: Generate the Sidekick skill and setup references.
    cmds:
      - uv run --script scripts/sidekick/generate_references.py

  skills:sidekick:check:
    desc: Check that generated Sidekick files are current.
    cmds:
      - uv run --script scripts/sidekick/generate_references.py --check

  skills:subagents:generate:
    desc: Generate every declarative subagent artifact.
    deps:
      - skills:routing:generate
      - skills:sidekick:generate

  skills:subagents:check:
    desc: Check every declarative subagent skill.
    deps:
      - skills:routing:check
      - skills:sidekick:check

  skills:restore-global:
    desc: Restore global skills from the native global skills lock, respecting local per-skill agent overrides.
    cmds:
      - |
        /usr/bin/env bash <<'BASH'
        set -euo pipefail

        node <<'NODE'
        const fs = require("node:fs");
        const os = require("node:os");
        const path = require("node:path");
        const { spawnSync } = require("node:child_process");

        const lockPath = process.env.XDG_STATE_HOME
          ? path.join(process.env.XDG_STATE_HOME, "skills", ".skill-lock.json")
          : path.join(os.homedir(), ".agents", ".skill-lock.json");

        if (!fs.existsSync(lockPath)) {
          console.error(`Global skills lock not found: ${lockPath}`);
          process.exit(1);
        }

        const originalLockText = fs.readFileSync(lockPath, "utf8");
        const lock = JSON.parse(originalLockText);
        const skills = Object.entries(lock.skills || {}).filter(([, entry]) => {
          return entry && entry.source;
        });

        if (skills.length === 0) {
          console.log(`No global skills recorded in ${lockPath}`);
          process.exit(0);
        }

        const defaultAgents = ["codex", "claude-code", "zed"];
        const claudeOnlySkills = [
          "claude-subagent-routing",
          "claude-sidekick",
          "codex-first",
          "grok-first",
        ];
        const codexOnlySkills = ["codex-subagent-routing", "codex-sidekick"];
        const skillAgentOverrides = new Map([
          ...claudeOnlySkills.map((skillName) => [skillName, ["claude-code"]]),
          ...codexOnlySkills.map((skillName) => [skillName, ["codex"]]),
        ]);
        const bySourceAndAgents = new Map();

        for (const [skillName, entry] of skills) {
          const source = entry.ref ? `${entry.source}#${entry.ref}` : entry.source;
          const agents = skillAgentOverrides.get(skillName) ?? defaultAgents;
          const key = JSON.stringify({ source, agents });
          if (!bySourceAndAgents.has(key)) {
            bySourceAndAgents.set(key, { source, agents, skillNames: [] });
          }
          bySourceAndAgents.get(key).skillNames.push(skillName);
        }

        let exitCode = 0;

        const harnessSpecificSkills = [
          ...claudeOnlySkills,
          ...codexOnlySkills,
        ].filter((skillName) => lock.skills?.[skillName]?.source);

        if (harnessSpecificSkills.length > 0) {
          console.log(
            `Removing stale harness placements for ${harnessSpecificSkills.join(", ")}`,
          );

          const result = spawnSync(
            "npx",
            [
              "-y",
              "skills@latest",
              "remove",
              ...harnessSpecificSkills,
              "-g",
              "-y",
            ],
            { stdio: "inherit" },
          );

          if (result.status !== 0) {
            exitCode = result.status ?? 1;
          }
        }

        for (const { source, agents, skillNames } of bySourceAndAgents.values()) {
          if (exitCode !== 0) break;

          const sortedSkills = skillNames.sort();
          console.log(
            `Restoring ${sortedSkills.length} skill(s) from ${source} to ${agents.join(", ")}`,
          );

          const result = spawnSync(
            "npx",
            [
              "-y",
              "skills@latest",
              "add",
              source,
              "-g",
              "--copy",
              "--full-depth",
              "-a",
              ...agents,
              "-s",
              ...sortedSkills,
              "-y",
            ],
            { stdio: "inherit" },
          );

          if (result.status !== 0) {
            exitCode = result.status ?? 1;
            break;
          }
        }

        const currentLockText = fs.readFileSync(lockPath, "utf8");
        if (currentLockText !== originalLockText) {
          fs.writeFileSync(lockPath, originalLockText);
        }

        process.exit(exitCode);
        NODE
        BASH
