version: "3"

silent: true

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  cli:check:
    desc: Type-check the repository-local CLI workspace.
    cmds:
      - mise exec -- pnpm check

  cli:test:
    desc: Run the repository-local CLI test suite.
    cmds:
      - mise exec -- pnpm test

  cli:verify:
    desc: Check, test, build, and smoke-test the packed repository-local CLI.
    cmds:
      - mise exec -- pnpm verify

  skills:routing:generate:
    desc: Generate the Codex subagent routing skill and lane references.
    cmds:
      - uv run --script scripts/subagent-routing/generate_references.py

  skills:routing:check:
    desc: Check that generated Codex subagent routing files are current.
    cmds:
      - uv run --script scripts/subagent-routing/generate_references.py --check

  skills:sidekick:generate:
    desc: Generate the Sidekick skill and setup references.
    cmds:
      - uv run --script scripts/sidekick/generate_references.py

  skills:sidekick:check:
    desc: Check that generated Sidekick files are current.
    cmds:
      - uv run --script scripts/sidekick/generate_references.py --check

  skills:subagents:generate:
    desc: Generate every declarative subagent skill.
    deps:
      - skills:routing:generate
      - skills:sidekick:generate

  skills:subagents:check:
    desc: Check every declarative subagent skill.
    deps:
      - skills:routing:check
      - skills:sidekick:check
