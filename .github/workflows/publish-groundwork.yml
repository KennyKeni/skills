name: Publish groundwork

on:
  push:
    tags:
      - 'groundwork-v*.*.*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.5.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Show OIDC identity (diagnostic)
        run: |
          npm --version
          claims=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | node -e "const t=JSON.parse(require('fs').readFileSync(0,'utf8')).value.split('.')[1]; console.log(Buffer.from(t,'base64url').toString())")
          printf '%s' "$claims" | node -e "const c=JSON.parse(require('fs').readFileSync(0,'utf8')); for (const k of ['repository','repository_owner','workflow_ref','job_workflow_ref','ref','environment','event_name']) console.log(k + ': ' + (c[k] ?? '(absent)'))"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const packageJson = JSON.parse(fs.readFileSync('packages/groundwork/package.json', 'utf8'))
          const expectedTag = `groundwork-v${packageJson.version}`
          const actualTag = process.env.GITHUB_REF_NAME

          if (actualTag !== expectedTag) {
            throw new Error(`Release tag ${actualTag} does not match package version ${expectedTag}`)
          }
          NODE

      - name: Verify
        run: pnpm --filter @kennykeni/groundwork verify

      - name: Verify package contents
        working-directory: packages/groundwork
        run: npm pack --dry-run

      - name: Resolve npm dist-tag
        id: npm-dist-tag
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const packageJson = JSON.parse(fs.readFileSync('packages/groundwork/package.json', 'utf8'))
          const match = packageJson.version.match(/-(alpha|beta|rc)\./)
          const tag = match?.[1] ?? ''

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`)
          console.log(tag ? `Publishing with npm dist-tag: ${tag}` : 'Publishing with npm default latest dist-tag')
          NODE

      - name: Publish
        working-directory: packages/groundwork
        env:
          NPM_DIST_TAG: ${{ steps.npm-dist-tag.outputs.tag }}
        run: |
          publish_args=(publish --access public --loglevel http)

          if [ -n "$NPM_DIST_TAG" ]; then
            publish_args+=(--tag "$NPM_DIST_TAG")
          fi

          npm "${publish_args[@]}"
